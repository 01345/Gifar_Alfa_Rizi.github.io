<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Tugas - Frame Navigasi (4 Halaman)</title>
    <style>
        /* Gaya utama dari kode asli tetap dipertahankan */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: linear-gradient(145deg, #f9f9f9 0%, #eaeef5 100%);
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }

        .judul {
            text-align: center;
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-shadow: 4px 4px 0 #ffe0b0, 6px 6px 0 rgba(0,0,0,0.1);
            margin-top: 0;
            margin-bottom: 10px;
        }

        .pembatas {
            background: linear-gradient(95deg, #2b2d42 0%, #3a5a6f 45%, #2b2d42 100%);
            padding: 1.2rem 1.8rem;
            border-radius: 60px 20px 60px 20px;
            margin: 25px 0 30px 0;
            box-shadow: 0 8px 0 #0f172a;
            border-left: 6px solid #facc15;
            transition: 0.2s;
        }

        /* Navigasi Frame */
        .nav-frame {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0 20px;
        }
        .nav-frame button {
            background: linear-gradient(135deg, #1e3c4c, #2a5a6e);
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #0f2b3d;
            letter-spacing: 1px;
        }
        .nav-frame button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #0f2b3d;
            background: linear-gradient(135deg, #2a5a6e, #1e3c4c);
        }
        .nav-frame button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0f2b3d;
        }

        /* Konten iframe */
        .frame-container {
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0,0,0,0.15);
            background: white;
            margin: 15px 0 20px;
            border: 2px solid rgba(255,255,240,0.6);
        }
        iframe {
            width: 100%;
            height: 650px;
            border: none;
            display: block;
            background: #fffef7;
        }

        /* Gaya tambahan untuk konsistensi */
        .footer-custom {
            text-align: center;
            margin-top: 24px;
            opacity: 0.9;
            color: #3b5c5a;
            font-weight: 500;
        }

        @media (max-width: 700px) {
            body { padding: 12px; margin: 15px; }
            .judul { font-size: 1.8rem; }
            .nav-frame button { padding: 8px 18px; font-size: 1rem; }
            iframe { height: 580px; }
        }
    </style>
</head>
<body>

    <!-- JUDUL -->
    <h1 class="judul">
        <span style="color:#D44A3B;">B</span><span style="color:#E68A2E;">I</span><span style="color:#DCB23A;">O</span><span style="color:#3A9B5F;">D</span><span style="color:#2A7FAA;">A</span><span style="color:#6C4F9F;">T</span><span style="color:#B54E8A;">A</span><span style="color:#CF5A3A;">K</span><span style="color:#D98C2E;">U</span>

                iframe.srcdoc = getHalamanHobby();

                iframe.srcdoc = getHalamanPendidikan();
            } else if (page === 'kontak') {
                iframe.srcdoc = getHalamanKontak();
