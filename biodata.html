            border-radius: 40px 12px 40px 12px;
            border: 3px dashed #334155;
            box-shadow: inset 0 0 0 2px #fff8, 0 16px 20px -8px #1e293b;
        }

        
        p {
            font-size: 1.4rem;
            margin: 1rem 0;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
        }

      
        .label-tebal {
            font-weight: 800;
            min-width: 90px;
            display: inline-block;
            font-size: 1.5rem;
            text-decoration: underline wavy rgba(0,0,0,0.1);
        }

      
        .dpn {
            color: #c43e7a;  
            font-weight: 600;
            text-shadow: 1px 1px 0 #f8cdda;
        }
        .blk {
            color: #2b6c94;  
            font-weight: 600;
            text-shadow: 1px 1px 0 #bbdefb;
        }

        .warna-nama-value  { color: #1f8459; }  
        .warna-usia-value  { color: #8e44ad; background: #f3e8ff; padding: 0 8px; border-radius: 12px; }  
        .warna-hobi        { color: #d97706; font-weight: 500; }  
        .warna-kota        { color: #a11f5c; font-weight: 500; }  
        .warna-kampus      { color: #0d6b6e; font-weight: 500; } 

        
        .label-npm { color: #a33329; background: #fee; padding: 0 6px 0 0; border-radius: 0; }
        .label-nama { color: #1c7e4c; background: #e3f7ec; padding: 0 6px 0 0; border-radius: 0; }
        .label-usia { color: #ac4e9b; background: #f3dcf0; padding: 0 6px 0 0; border-radius: 0; }
        .label-lain { color: #3f6792; } 

        
        .nilai-spesial {
            font-size: 1.4rem;
        }
        hr {
            display: none;
        }
